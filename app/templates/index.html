{% extends "base.html" %}

{% block title %}Physicat ホーム{% endblock %}

{% block content %}
  <section class="home-hero">
    <div class="hero-text">
      <h1>Physicatへようこそ</h1>
      <p>物理学を直感的に理解し、シミュレーションとクイズで学習を進める。</p>
      <a class="home-button" href="{{ url_for('pages.toc') }}">学習開始</a>
    </div>
    <div class="hero-image">
      <img src="{{ url_for('static', filename='gif/dance.gif') }}" alt="dance">
    </div>
  </section>

  <section class="placeholder-grid">
    <div class="placeholder-card">
      <img src="{{ url_for('static', filename='gif/maxwell.gif') }}" alt="maxwell">
      <p>猫のマックスウェルと一緒にマックスウェル方程式を学ぼう！</p>
    </div>
    <div class="placeholder-card">
      <img src="{{ url_for('static', filename='gif/fluid.gif') }}" alt="fluid">
      <p>猫のように流体の物理学を学ぼう！</p>
    </div>
  </section>

  <section id="about" class="panel">
    <h2>About</h2>
    <p>猫はかわいいし、物理学が大好きで...</p>
  </section>
{% endblock %}
