<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>インタラクティブ物理 - 波</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <h1>🌊 波の物理クイズ</h1>
    <p class="subtitle">探索、シミュレーション、理解度チェック！</p>

    <nav class="navbar">
        <a class="nav-brand" href="{{ url_for('pages.index') }}">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo">
            <span>Wave Physics</span>
        </a>
        <div class="nav-links">
            <a href="{{ url_for('pages.index') }}">Home</a>
            <a href="{{ url_for('pages.toc') }}">目次</a>
            <a href="{{ url_for('pages.wave_learn') }}">シミュレーション</a>
            <a href="{{ url_for('pages.about') }}">About</a>
        </div>
    </nav>

    <div id="canvas-container"></div>
    <!-- クイズパネル -->
    <div class="panel">
        <h2>📝 波のクイズ</h2>
        <div class="score-bar">
            <span class="score-text">スコア:</span>
            <span class="score-num"><span id="scoreNum">0</span>/<span id="totalQ">8</span></span>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>
            <button class="btn-reset" onclick="resetQuiz()">🔄 リセット</button>
        </div>
        <div class="quiz-container" id="quizContainer"></div>
    </div>
    <script src="{{ url_for('static', filename='js/wave/quiz.js') }}"></script>
</body>
